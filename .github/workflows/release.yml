name: Release

on:
  workflow_run:
    workflows: [Validate]
    types: [completed]
    branches: [master]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release-type:
        type: choice
        description: Version bump before build (manual only)
        required: true
        default: patch
        options:
          - patch
          - minor
          - none
      create-release:
        type: boolean
        description: Create GitHub Release and upload installers
        required: true
        default: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Check trigger
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push')
    steps:
      - run: echo "Release pipeline allowed"

  prepare:
    name: Prepare version
    needs: gate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      bumped: ${{ steps.bump.outputs.bumped }}
      checkout_ref: ${{ steps.checkout_ref.outputs.ref }}
    steps:
      - name: Resolve checkout ref
        id: checkout_ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.checkout_ref.outputs.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        id: bump
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ "${{ github.event.inputs.release-type }}" = "none" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          pnpm version ${{ github.event.inputs.release-type }} --no-git-tag-version
          node scripts/common/sync-version.mjs
          git add package.json crates/tauri-app/src-tauri/tauri.conf.json crates/tauri-app/src-tauri/Cargo.toml
          git commit -m "chore: release v$(node -p "require('./package.json').version")"
          git push origin HEAD:master
          echo "bumped=true" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        shell: bash

  build:
    name: Build (${{ matrix.platform }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows
            artifact_name: windows-nsis-x64
          - os: macos-latest
            platform: macos
            artifact_name: macos-dmg
          - os: ubuntu-latest
            platform: linux
            artifact_name: linux-packages

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && needs.prepare.outputs.bumped == 'true' && 'master' || needs.prepare.outputs.checkout_ref }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf \
            libssl-dev libgtk-3-dev rpm build-essential python3

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bundle sidecar resources
        run: pnpm build:sidecar

      - name: Verify sidecar resources
        run: test -f crates/tauri-app/src-tauri/resources/sidecar/index.js

      - name: Sync Tauri version
        run: node scripts/common/sync-version.mjs

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: crates/tauri-app/src-tauri
          shared-key: ${{ matrix.platform }}-release

      - name: Build application (Windows)
        if: matrix.platform == 'windows'
        run: pnpm run package
        env:
          CXXFLAGS: /EHsc
          CARGO_TARGET_DIR: D:\ct
          CARGO_BUILD_JOBS: 1

      - name: Build application
        if: matrix.platform != 'windows'
        run: pnpm run package

      - name: Collect installer artifact (Windows)
        if: matrix.platform == 'windows'
        run: node scripts/release/collect.mjs ${{ matrix.platform }}
        env:
          CARGO_TARGET_DIR: D:\ct

      - name: Collect installer artifact
        if: matrix.platform != 'windows'
        run: node scripts/release/collect.mjs ${{ matrix.platform }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: build/release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [prepare, build]
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.create-release == 'true')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: master

      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: windows-nsis-x64
          path: dist/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v5
        with:
          name: macos-dmg
          path: dist/macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v5
        with:
          name: linux-packages
          path: dist/linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: CS Demo Analyst v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          make_latest: true
          files: |
            dist/windows/*
            dist/macos/*
            dist/linux/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-beta:
    name: Publish Beta Release
    needs: [prepare, build]
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: windows-nsis-x64
          path: dist/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v5
        with:
          name: macos-dmg
          path: dist/macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v5
        with:
          name: linux-packages
          path: dist/linux

      - name: Update latest-beta tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa latest-beta "${{ needs.prepare.outputs.checkout_ref }}"
          git push origin latest-beta --force

      - name: Publish beta GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-beta
          name: Latest Beta (v${{ needs.prepare.outputs.version }})
          prerelease: true
          make_latest: false
          generate_release_notes: true
          body: |
            Rolling beta build for commit `${{ needs.prepare.outputs.checkout_ref }}`.
            Package version in tree: **v${{ needs.prepare.outputs.version }}**.
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: |
            dist/windows/*
            dist/macos/*
            dist/linux/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
